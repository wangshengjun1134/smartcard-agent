<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APDU 控制台</title>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #fafafa;
      --bg-titlebar: #f7f7f9;
      --bg-card: #ffffff;
      --border-color: #ececee;
      --text-primary: #1a1a1a;
      --text-secondary: #999;
      --accent-blue: #4b6ef3;
      --accent-orange: #fa8c16;
      --accent-purple: #722ed1;
      --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 模拟标题栏 */
    .titlebar {
      background: var(--bg-titlebar);
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      user-select: none;
    }

    .titlebar-left {
      flex: 1;
    }

    .titlebar-controls {
      display: flex;
      align-items: center;
    }

    .titlebar-btn {
      width: 46px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: transparent;
      border: none;
      outline: none;
      transition: background 0.15s;
    }

    .titlebar-btn:hover {
      background: #e5e5e5;
    }

    .titlebar-btn.close:hover {
      background: #e81123;
    }

    .titlebar-btn svg {
      width: 10px;
      height: 10px;
      color: #333;
    }

    .titlebar-btn.close:hover svg {
      color: white;
    }

    /* 内容区域 */
    .header {
      background: var(--bg-primary);
      padding: 0 16px;
      height: 45px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .console {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: var(--bg-secondary);
    }

    .entry {
      background: var(--bg-card);
      margin-bottom: 8px;
      padding: 8px 12px;
      border-radius: 4px;
      font: 13px/1.5 var(--font-mono);
    }

    .send-line, .resp-line {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .left {
      display: flex;
      align-items: flex-start;
      flex: 1;
    }

    .symbol {
      font-weight: bold;
      width: 16px;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .symbol.send { color: var(--accent-orange); }
    .symbol.resp { color: var(--accent-blue); }

    .apdu {
      word-break: break-all;
      flex: 1;
    }

    .time {
      color: var(--text-secondary);
      font-size: 11px;
      width: 100px;
      text-align: right;
      margin-left: 12px;
      flex-shrink: 0;
    }

    .duration {
      color: var(--accent-purple);
      font-size: 12px;
      width: 100px;
      text-align: right;
      margin-left: 12px;
      flex-shrink: 0;
    }

    .empty {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px;
      font: 13px var(--font-mono);
      font-style: italic;
    }

    .input-area {
      background: var(--bg-primary);
      border-top: 1px solid var(--border-color);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .input-area textarea {
      font: 13px var(--font-mono);
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      outline: none;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      background: var(--bg-secondary);
    }

    .input-area textarea:focus {
      border-color: var(--border-color);
    }

    .input-area button {
      font: 13px var(--font-mono);
      background: var(--accent-blue);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      height: 40px;
      flex-shrink: 0;
    }

    .input-area button:hover {
      background: #3a5bd9;
    }

    .resp-line { margin-top: 4px; }
  </style>
</head>
<body>
  <!-- 模拟标题栏 -->
  <div class="titlebar" data-tauri-drag-region>
    <div class="titlebar-left" data-tauri-drag-region></div>
    <div class="titlebar-controls">
      <!-- 最小化 -->
      <button class="titlebar-btn minimize" onclick="minimizeWindow()">
        <svg viewBox="0 0 10 10"><path d="M 0 5 L 10 5" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <!-- 最大化 -->
      <button class="titlebar-btn maximize" onclick="toggleMaximize()">
        <svg viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" stroke="currentColor" stroke-width="1" fill="none"/></svg>
      </button>
      <!-- 关闭 -->
      <button class="titlebar-btn close" onclick="closeWindow()">
        <svg viewBox="0 0 10 10"><path d="M 0 0 L 10 10 M 10 0 L 0 10" stroke="currentColor" stroke-width="1"/></svg>
      </button>
    </div>
  </div>

  <div class="header">
    <div class="header-title">
      <span>APDU 控制台</span>
    </div>
  </div>
  <div class="console" id="console">
    <div class="empty">等待 APDU 指令...</div>
  </div>
  <div class="input-area">
    <textarea id="apduInput" placeholder="输入 APDU 指令 (Ctrl+Enter 发送)" rows="1"></textarea>
    <button onclick="sendManualApdu()">发送</button>
  </div>

  <script>
    // 窗口控制 - 使用全局 Tauri API
    let appWindow = null;

    // 等待 Tauri API 加载完成
    function initTauri() {
      if (window.__TAURI__ && window.__TAURI__.webviewWindow) {
        appWindow = window.__TAURI__.webviewWindow.getCurrentWebviewWindow();
      }
    }

    // DOM 加载完成后初始化
    document.addEventListener('DOMContentLoaded', initTauri);

    async function minimizeWindow() {
      if (appWindow) {
        await appWindow.minimize();
      }
    }

    async function toggleMaximize() {
      if (appWindow) {
        await appWindow.toggleMaximize();
      }
    }

    async function closeWindow() {
      if (appWindow) {
        await appWindow.close();
      }
    }

    // APDU 控制台逻辑
    const consoleEl = document.getElementById('console');
    const apduInput = document.getElementById('apduInput');
    const MAX_ENTRIES = 50;

    function now() {
      const d = new Date();
      return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}.${d.getMilliseconds().toString().padStart(3, '0')}`;
    }

    function formatApdu(hexStr) {
      const cleaned = hexStr.replace(/\s/g, '');
      const pairs = cleaned.match(/.{1,2}/g) || [];
      return pairs.join(' ');
    }

    function generateHex256() {
      let hex = '';
      for (let i = 0; i < 256; i++) {
        hex += i.toString(16).padStart(2, '0').toUpperCase();
      }
      return hex;
    }

    function generateRandomResponse(sendApdu) {
      const cleaned = sendApdu.replace(/\s/g, '');
      const len = Math.min(cleaned.length / 2, 20);
      let resp = '';
      for (let i = 0; i < len; i++) {
        resp += Math.floor(Math.random() * 256).toString(16).padStart(2, '0').toUpperCase();
      }
      return resp + ' 90 00';
    }

    function addEntry(sendApdu, respApdu, duration) {
      const empty = consoleEl.querySelector('.empty');
      if (empty) empty.remove();

      const formattedSend = formatApdu(sendApdu);
      const formattedResp = formatApdu(respApdu);

      const entry = document.createElement('div');
      entry.className = 'entry';
      entry.innerHTML = `
        <div class="send-line">
          <div class="left">
            <span class="symbol send">&gt;</span>
            <span class="apdu">${formattedSend}</span>
          </div>
          <span class="time">${now()}</span>
        </div>
        <div class="resp-line">
          <div class="left">
            <span class="symbol resp">&lt;</span>
            <span class="apdu">${formattedResp}</span>
          </div>
          <span class="duration">${duration} ms</span>
        </div>
      `;
      consoleEl.insertBefore(entry, consoleEl.firstChild);

      const entries = consoleEl.querySelectorAll('.entry');
      for (let i = MAX_ENTRIES; i < entries.length; i++) {
        entries[i].remove();
      }
    }

    function sendManualApdu() {
      const inputValue = apduInput.value.trim();
      if (!inputValue) return;

      const lines = inputValue.split('\n').filter(line => line.trim());

      lines.forEach(line => {
        const sendApdu = line.trim();
        const respApdu = generateRandomResponse(sendApdu);
        const duration = Math.floor(Math.random() * 200) + 15;
        addEntry(sendApdu, respApdu, duration);
      });

      apduInput.value = '';
      apduInput.style.height = 'auto';
    }

    apduInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        sendManualApdu();
      }
    });

    apduInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // 初始化示例数据
    const hex256 = generateHex256();
    const sampleData = [
      { send: '00 A4 04 00 0E 32 50 41 59 2E 53 59 53 2E 44 44 46 30 31', resp: '6F 2C 84 0E 32 50 41 59 2E 53 59 53 2E 44 44 46 30 31 A5 1A 88 01 01 5F 2D 04 7A 68 2D 43 4E 9F 11 01 01 90 00', duration: 127 },
      { send: '00 B0 00 00 10', resp: '00 11 22 33 44 55 66 77 88 99 AA BB CC DD EE FF 90 00', duration: 45 },
      { send: '00 CA 9F 17 00', resp: '9F 17 01 02 90 00', duration: 32 },
      { send: '80 50 00 00 08 11 22 33 44 55 66 77 88', resp: '90 00', duration: 18 },
      { send: hex256, resp: hex256 + ' 90 00', duration: 256 }
    ];

    sampleData.forEach(data => {
      addEntry(data.send, data.resp, data.duration);
    });

    window.apduConsole = {
      log: function(sendApdu, respApdu, duration) {
        addEntry(sendApdu, respApdu, duration);
      }
    };
  </script>
</body>
</html>
