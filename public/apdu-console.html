<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APDU 控制台</title>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #fafafa;
      --bg-titlebar: #f7f7f9;
      --bg-card: #ffffff;
      --border-color: #ececee;
      --text-primary: #1a1a1a;
      --text-secondary: #999;
      --accent-blue: #4b6ef3;
      --accent-orange: #fa8c16;
      --accent-purple: #722ed1;
      --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 模拟标题栏 */
    .titlebar {
      background: var(--bg-titlebar);
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      user-select: none;
    }

    .titlebar-left {
      flex: 1;
      display: flex;
      align-items: center;
      padding-left: 12px;
      gap: 8px;
    }

    .titlebar-controls {
      display: flex;
      align-items: center;
    }

    .titlebar-btn {
      width: 46px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: transparent;
      border: none;
      outline: none;
      transition: background 0.15s;
    }

    .titlebar-btn:hover {
      background: #e5e5e5;
    }

    .titlebar-btn.close:hover {
      background: #e81123;
    }

    .titlebar-btn svg {
      width: 10px;
      height: 10px;
      color: #333;
    }

    .titlebar-btn.close:hover svg {
      color: white;
    }

    /* 读卡器选择下拉 */
    .reader-select {
      position: relative;
      display: flex;
      align-items: center;
    }

    .reader-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #333;
      transition: background 0.15s;
    }

    .reader-btn:hover {
      background: #e5e5e5;
    }

    .reader-btn svg {
      width: 14px;
      height: 14px;
      color: #555;
    }

    .reader-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
      min-width: 220px;
      z-index: 1000;
      display: none;
      padding: 4px 0;
    }

    .reader-dropdown.show {
      display: block;
    }

    .reader-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      transition: background 0.15s;
    }

    .reader-item:hover {
      background: #f7f8fa;
    }

    .reader-item.selected {
      background: #f0f2f5;
    }

    .reader-item svg {
      width: 16px;
      height: 16px;
      color: #4b6ef3;
    }

    .reader-item.unselected svg {
      color: transparent;
    }

    .reader-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: auto;
    }

    .reader-status.connected {
      background: #e6f7e6;
      color: #52c41a;
    }

    .reader-status.disconnected {
      background: #fff1f0;
      color: #ff4d4f;
    }

    /* 连接按钮 */
    .connect-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: transparent;
      color: #333;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }

    .connect-btn:hover {
      background: #e5e5e5;
    }

    .connect-btn.connected {
      color: var(--accent-blue);
    }

    .connect-btn svg {
      width: 14px;
      height: 14px;
    }

    /* 内容区域 */
    .header {
      background: var(--bg-primary);
      padding: 0 16px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .console {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: var(--bg-secondary);
    }

    .entry {
      background: var(--bg-card);
      margin-bottom: 8px;
      padding: 8px 12px;
      border-radius: 4px;
      font: 13px/1.5 var(--font-mono);
    }

    .send-line, .resp-line {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .left {
      display: flex;
      align-items: flex-start;
      flex: 1;
    }

    .symbol {
      font-weight: bold;
      width: 16px;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .symbol.send { color: var(--accent-orange); }
    .symbol.resp { color: var(--accent-blue); }

    .apdu {
      word-break: break-all;
      flex: 1;
    }

    .time {
      color: var(--text-secondary);
      font-size: 11px;
      width: 100px;
      text-align: right;
      margin-left: 12px;
      flex-shrink: 0;
    }

    .duration {
      color: var(--accent-purple);
      font-size: 12px;
      width: 100px;
      text-align: right;
      margin-left: 12px;
      flex-shrink: 0;
    }

    .empty {
      text-align: center;
      color: var(--text-secondary);
      padding: 40px;
      font: 13px var(--font-mono);
      font-style: italic;
    }

    .input-area {
      background: var(--bg-primary);
      border-top: 1px solid var(--border-color);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .input-box {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 12px 12px 8px 12px;
    }

    .input-box textarea {
      width: 100%;
      font: 13px var(--font-mono);
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      min-height: 32px;
      max-height: 120px;
      color: var(--text-primary);
    }

    .input-box textarea::placeholder {
      color: var(--text-secondary);
    }

    .input-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 8px;
    }

    .send-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: not-allowed;
      transition: background 0.15s;
      border: none;
    }

    .send-btn.active {
      background: var(--accent-blue);
      cursor: pointer;
    }

    .send-btn svg {
      width: 14px;
      height: 14px;
    }

    .resp-line { margin-top: 4px; }
  </style>
</head>
<body>
  <!-- 模拟标题栏 -->
  <div class="titlebar" data-tauri-drag-region>
    <div class="titlebar-left" data-tauri-drag-region></div>
    <div class="titlebar-controls">
      <!-- 最小化 -->
      <button class="titlebar-btn minimize" onclick="minimizeWindow()">
        <svg viewBox="0 0 10 10"><path d="M 0 5 L 10 5" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <!-- 最大化 -->
      <button class="titlebar-btn maximize" onclick="toggleMaximize()">
        <svg viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" stroke="currentColor" stroke-width="1" fill="none"/></svg>
      </button>
      <!-- 关闭 -->
      <button class="titlebar-btn close" onclick="closeWindow()">
        <svg viewBox="0 0 10 10"><path d="M 0 0 L 10 10 M 10 0 L 0 10" stroke="currentColor" stroke-width="1"/></svg>
      </button>
    </div>
  </div>

  <div class="header">
    <!-- 读卡器选择下拉 -->
    <div class="reader-select">
      <button class="reader-btn" onclick="toggleReaderDropdown(event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="6" width="20" height="12" rx="2"/>
          <line x1="6" y1="10" x2="6" y2="14"/>
          <line x1="10" y1="10" x2="10" y2="14"/>
        </svg>
        <span id="currentReader">请选择读卡器</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <div class="reader-dropdown" id="readerDropdown">
        <div class="reader-item unselected" onclick="selectReader('ACR122U-A9', true)">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
          <span>ACR122U-A9</span>
          <span class="reader-status connected">已连接</span>
        </div>
        <div class="reader-item unselected" onclick="selectReader('ACR1255U-B1', false)">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
          <span>ACR1255U-B1</span>
          <span class="reader-status disconnected">未连接</span>
        </div>
        <div class="reader-item unselected" onclick="selectReader('HID OMNIKEY 3021', false)">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
          <span>HID OMNIKEY 3021</span>
          <span class="reader-status disconnected">未连接</span>
        </div>
        <div class="reader-item unselected" onclick="selectReader('Feitian R502', true)">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
          <span>Feitian R502</span>
          <span class="reader-status connected">已连接</span>
        </div>
      </div>
    </div>
    <!-- 连接/断开按钮 -->
    <button class="connect-btn" id="connectBtn" onclick="toggleConnect()">
      <svg id="connectIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span id="connectText">连接</span>
    </button>
  </div>
  <div class="console" id="console">
    <div class="empty">等待 APDU 指令...</div>
  </div>
  <div class="input-area">
    <div class="input-box">
      <textarea id="apduInput" placeholder="输入 APDU 指令 (Ctrl+Enter 发送)" rows="1"></textarea>
      <div class="input-footer">
        <button class="send-btn" id="sendBtn" onclick="sendManualApdu()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // 窗口控制 - 使用全局 Tauri API
    let appWindow = null;

    // 等待 Tauri API 加载完成
    function initTauri() {
      if (window.__TAURI__ && window.__TAURI__.webviewWindow) {
        appWindow = window.__TAURI__.webviewWindow.getCurrentWebviewWindow();
      }
    }

    // DOM 加载完成后初始化
    document.addEventListener('DOMContentLoaded', initTauri);

    async function minimizeWindow() {
      if (appWindow) {
        await appWindow.minimize();
      }
    }

    async function toggleMaximize() {
      if (appWindow) {
        await appWindow.toggleMaximize();
      }
    }

    async function closeWindow() {
      if (appWindow) {
        await appWindow.close();
      }
    }

    // 读卡器下拉菜单控制
    const readerDropdown = document.getElementById('readerDropdown');
    const currentReaderSpan = document.getElementById('currentReader');

    // 模拟读卡器数据
    const readers = [
      { name: 'ACR122U-A9', connected: true },
      { name: 'ACR1255U-B1', connected: false },
      { name: 'HID OMNIKEY 3021', connected: false },
      { name: 'Feitian R502', connected: true }
    ];

    let selectedReader = null;

    function toggleReaderDropdown(event) {
      event.stopPropagation();
      readerDropdown.classList.toggle('show');
    }

    function selectReader(name, connected) {
      selectedReader = name;
      currentReaderSpan.textContent = name;

      // 更新下拉菜单选中状态
      const items = readerDropdown.querySelectorAll('.reader-item');
      items.forEach(item => {
        const readerName = item.querySelector('span:not(.reader-status)').textContent;
        if (readerName === name) {
          item.classList.add('selected');
          item.classList.remove('unselected');
        } else {
          item.classList.remove('selected');
          item.classList.add('unselected');
        }
      });

      // 关闭下拉菜单
      readerDropdown.classList.remove('show');
    }

    // 点击其他区域关闭下拉菜单
    document.addEventListener('click', function(event) {
      if (!event.target.closest('.reader-select')) {
        readerDropdown.classList.remove('show');
      }
    });

    // 连接/断开按钮
    const connectBtn = document.getElementById('connectBtn');
    const connectText = document.getElementById('connectText');
    const connectIcon = document.getElementById('connectIcon');
    let isConnected = false;

    function toggleConnect() {
      if (!selectedReader) {
        alert('请先选择读卡器');
        return;
      }

      isConnected = !isConnected;

      if (isConnected) {
        connectBtn.classList.add('connected');
        connectText.textContent = '断开';
        connectIcon.innerHTML = '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6" fill="currentColor"/>';
      } else {
        connectBtn.classList.remove('connected');
        connectText.textContent = '连接';
        connectIcon.innerHTML = '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    // APDU 控制台逻辑
    const consoleEl = document.getElementById('console');
    const apduInput = document.getElementById('apduInput');
    const sendBtn = document.getElementById('sendBtn');
    const MAX_ENTRIES = 50;

    // 更新发送按钮状态
    function updateSendBtnState() {
      const hasContent = apduInput.value.trim().length > 0;
      if (hasContent) {
        sendBtn.classList.add('active');
      } else {
        sendBtn.classList.remove('active');
      }
    }

    apduInput.addEventListener('input', function() {
      this.style.height = '32px';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      updateSendBtnState();
    });

    function now() {
      const d = new Date();
      return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}.${d.getMilliseconds().toString().padStart(3, '0')}`;
    }

    function formatApdu(hexStr) {
      const cleaned = hexStr.replace(/\s/g, '');
      const pairs = cleaned.match(/.{1,2}/g) || [];
      return pairs.join(' ');
    }

    function generateHex256() {
      let hex = '';
      for (let i = 0; i < 256; i++) {
        hex += i.toString(16).padStart(2, '0').toUpperCase();
      }
      return hex;
    }

    function generateRandomResponse(sendApdu) {
      const cleaned = sendApdu.replace(/\s/g, '');
      const len = Math.min(cleaned.length / 2, 20);
      let resp = '';
      for (let i = 0; i < len; i++) {
        resp += Math.floor(Math.random() * 256).toString(16).padStart(2, '0').toUpperCase();
      }
      return resp + ' 90 00';
    }

    function addEntry(sendApdu, respApdu, duration) {
      const empty = consoleEl.querySelector('.empty');
      if (empty) empty.remove();

      const formattedSend = formatApdu(sendApdu);
      const formattedResp = formatApdu(respApdu);

      const entry = document.createElement('div');
      entry.className = 'entry';
      entry.innerHTML = `
        <div class="send-line">
          <div class="left">
            <span class="symbol send">&gt;</span>
            <span class="apdu">${formattedSend}</span>
          </div>
          <span class="time">${now()}</span>
        </div>
        <div class="resp-line">
          <div class="left">
            <span class="symbol resp">&lt;</span>
            <span class="apdu">${formattedResp}</span>
          </div>
          <span class="duration">${duration} ms</span>
        </div>
      `;
      consoleEl.insertBefore(entry, consoleEl.firstChild);

      const entries = consoleEl.querySelectorAll('.entry');
      for (let i = MAX_ENTRIES; i < entries.length; i++) {
        entries[i].remove();
      }
    }

    function sendManualApdu() {
      const inputValue = apduInput.value.trim();
      if (!inputValue) return;

      const lines = inputValue.split('\n').filter(line => line.trim());

      lines.forEach(line => {
        const sendApdu = line.trim();
        const respApdu = generateRandomResponse(sendApdu);
        const duration = Math.floor(Math.random() * 200) + 15;
        addEntry(sendApdu, respApdu, duration);
      });

      apduInput.value = '';
      apduInput.style.height = '32px';
      updateSendBtnState();
    }

    apduInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        sendManualApdu();
      }
    });

    // 初始化示例数据
    const hex256 = generateHex256();
    const sampleData = [
      { send: '00 A4 04 00 0E 32 50 41 59 2E 53 59 53 2E 44 44 46 30 31', resp: '6F 2C 84 0E 32 50 41 59 2E 53 59 53 2E 44 44 46 30 31 A5 1A 88 01 01 5F 2D 04 7A 68 2D 43 4E 9F 11 01 01 90 00', duration: 127 },
      { send: '00 B0 00 00 10', resp: '00 11 22 33 44 55 66 77 88 99 AA BB CC DD EE FF 90 00', duration: 45 },
      { send: '00 CA 9F 17 00', resp: '9F 17 01 02 90 00', duration: 32 },
      { send: '80 50 00 00 08 11 22 33 44 55 66 77 88', resp: '90 00', duration: 18 },
      { send: hex256, resp: hex256 + ' 90 00', duration: 256 }
    ];

    sampleData.forEach(data => {
      addEntry(data.send, data.resp, data.duration);
    });

    window.apduConsole = {
      log: function(sendApdu, respApdu, duration) {
        addEntry(sendApdu, respApdu, duration);
      }
    };
  </script>
</body>
</html>
